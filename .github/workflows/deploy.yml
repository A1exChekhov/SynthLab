name: Deploy to Server

on:
  push:
    branches:
      - main # Убедитесь, что ваша главная ветка называется main (а не master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/SynthLab
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            cd synth-app
            npm install
            npm run build
            # Диагностика: проверяем файлы и порты
            ls -la dist
            # Перезапуск на порту 4173, который ждет Nginx
            pm2 delete synth-generator || true
            pm2 serve dist 4173 --name "synth-generator" --spa --hostname 127.0.0.1
            # Проверка
            pm2 status
